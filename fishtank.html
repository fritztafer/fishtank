<body>
<main>
    <div class="cameras"></div>
    <video class="stream" poster="https://www.fishtank.live/images/logo.png" controls autoplay muted playsinline></video>
</main>
<script>
const main = document.querySelector("main");
const cameras = document.querySelector(".cameras");
const player = document.querySelector(".stream");
const letter = "h";
const params = "";
const cams = {
    "Director": {
        "stream": "https://epyc.goran.jetzt:444/hls/dirc-5/index.m3u8",
        "thumb": `https://streams-${letter}.fishtank.live/live+dirc-5.jpeg`
    }, "Dorm": {
        "stream": "https://epyc.goran.jetzt:444/hls/dmrm-5/index.m3u8",
        "thumb": `https://streams-${letter}.fishtank.live/live+dmrm-5.jpeg`
    }, "Foyer": {
        "stream": "https://epyc.goran.jetzt:444/hls/foyr-5/index.m3u8",

    }, "Closet": {

    }, "Glassroom": {

        "thumb": `https://streams-${letter}.fishtank.live/live+gsrm-5.jpeg`
    }, "Bar": {
        "stream": "https://epyc.goran.jetzt:444/hls/brrr-5/index.m3u8",
        "thumb": `https://streams-${letter}.fishtank.live/live+brrr-5.jpeg`
    }, "Corridor": {
        "stream": "https://epyc.goran.jetzt:444/hls/codr-5/index.m3u8",
        "thumb": `https://streams-${letter}.fishtank.live/live+codr-5.jpeg`
    }, "Kitchen": {

        "thumb": `https://streams-${letter}.fishtank.live/live+ktch-5.jpeg`
    }, "Dining Room": {
        "stream": "https://epyc.goran.jetzt:444/hls/dnrm-5/index.m3u8",
        "thumb": `https://streams-${letter}.fishtank.live/live+dnrm-5.jpeg`
    }, "Market": {
        "stream": "https://epyc.goran.jetzt:444/hls/mrke-5/index.m3u8",
        "thumb": `https://streams-${letter}.fishtank.live/live+mrke-5.jpeg`
    }, "Hallway": {
        "stream": "https://epyc.goran.jetzt:444/hls/hwdn-5/index.m3u8",
        "thumb": `https://streams-${letter}.fishtank.live/live+hwdn-5.jpeg`
    }, "East Wing": {
        "stream": "https://epyc.goran.jetzt:444/hls/bkny-5/index.m3u8",
        "thumb": `https://streams-${letter}.fishtank.live/live+bkny-5.jpeg`
    }, "West Wing": {
        "stream": "https://epyc.goran.jetzt:444/hls/hwup-5/index.m3u8",
        "thumb": `https://streams-${letter}.fishtank.live/live+hwup-5.jpeg`
    }, "Confessional": {
        "stream": "https://epyc.goran.jetzt:444/hls/cfsl-5/index.m3u8",
        "thumb": `https://streams-${letter}.fishtank.live/live+cfsl-5.jpeg`
    }, "Cameraman": {

        "thumb": `https://streams-${letter}.fishtank.live/live+cameraman2-5.jpeg`
    }, "Jungle Room": {
        "stream": "https://epyc.goran.jetzt:444/hls/br4j-5/index.m3u8",
        "thumb": `https://streams-${letter}.fishtank.live/live+br4j-5.jpeg`
    }, "Bar PTZ": {
        "stream": "https://epyc.goran.jetzt:444/hls/brpz-5/index.m3u8",
        "thumb": `https://streams-${letter}.fishtank.live/live+brpz-5.jpeg`
    }, "Market Alternative": {
        "stream": "https://epyc.goran.jetzt:444/hls/mrke2-5/index.m3u8",
        "thumb": `https://streams-${letter}.fishtank.live/live+mrke2-5.jpeg`
    }, "Bar Alternative": {
        "stream": "https://epyc.goran.jetzt:444/hls/brrr2-5/index.m3u8",
        "thumb": `https://streams-${letter}.fishtank.live/live+brrr2-5.jpeg`
    }, "Dorm Alternative": {
        "stream": "https://epyc.goran.jetzt:444/hls/dmrm2-5/index.m3u8",
        "thumb": `https://streams-${letter}.fishtank.live/live+dmrm2-5.jpeg`
    }, "Jacuzzi": {
        "stream": "https://epyc.goran.jetzt:444/hls/jckz-5/index.m3u8",
        "thumb": `https://streams-${letter}.fishtank.live/live+jckz-5.jpeg`
    }
}, half = ["East Wing", "West Wing"];
camerasWidth();
window.addEventListener("resize", camerasWidth);
for (let cam in cams) {
    let current;
    const camera = Object.assign(document.createElement("button"), {classList: "camera", textContent: cam, value: cam, onclick: () => stream(cam)});
    const updateThumb = async () => {
        const thumb = cams[cam].thumb;
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 800);
        try {
            const response = await fetch(`${thumb}?refresh=${Date.now()}`);
            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            if (current) URL.revokeObjectURL(current);
            current = url;
            camera.style.backgroundImage = `url("${url}")`;
        } catch (e) {} finally {clearTimeout(timeout);}
    }
    const loop = async () => {
        await updateThumb();
        setTimeout(loop, 60000);
    }
    loop();
    if (half.includes(cam)) camera.classList.add("half");
    document.querySelector(".cameras").appendChild(camera);
}
function stream(cam) {
    const url = cams[cam].stream + params;
    active(cam);
    if (window.hls) window.hls.destroy();
    if (Hls.isSupported()) {
        window.hls = new Hls();
        window.hls.loadSource(url);
        window.hls.attachMedia(player);
        window.hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
    } else alert("unsupported");
}
function active(cam) {
    document.querySelectorAll(".camera").forEach(btn => btn.classList.remove("active"));
    const button = [...document.querySelectorAll(".camera")].find(btn => btn.value === cam);
    if (button) button.classList.add("active");
}
function camerasWidth() {
    const streamWidth = main.clientHeight * (16 / 9);
    let camerasWidth = main.clientWidth - streamWidth;
    if (camerasWidth < 150) camerasWidth = 150;
    else if (camerasWidth > 320) camerasWidth = 320;
    cameras.style.width = `${camerasWidth}px`;
}
</script>
